<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试所有Tab</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>Flutter 教程 - Tab测试</h1>
            </div>
        </div>
    </header>

    <main>
        <!-- Tab 导航 -->
        <div class="tab-navigation">
            <div class="container">
                <div class="tabs-container">
                    <button class="tab-btn active" data-tab="architecture">
                        <span class="tab-icon">🏗️</span>
                        <span class="tab-text">架构概览</span>
                    </button>
                    <button class="tab-btn" data-tab="components">
                        <span class="tab-icon">🧩</span>
                        <span class="tab-text">组件系统</span>
                    </button>
                    <button class="tab-btn" data-tab="ecosystem">
                        <span class="tab-icon">🌍</span>
                        <span class="tab-text">第三方生态</span>
                    </button>
                    <button class="tab-btn" data-tab="packaging">
                        <span class="tab-icon">📦</span>
                        <span class="tab-text">应用打包</span>
                    </button>
                    <button class="tab-btn" data-tab="tutorials">
                        <span class="tab-icon">📚</span>
                        <span class="tab-text">教程系列</span>
                    </button>
                    <button class="tab-btn" data-tab="ai-coding">
                        <span class="tab-icon">🤖</span>
                        <span class="tab-text">AI 代码生成</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Tab 内容区域 -->
        <div class="tab-content-container">
            <!-- 架构概览 Tab -->
            <div class="tab-panel active" id="architecture">
                <div class="container">
                    <h2>架构概览</h2>
                    <p>这是架构概览的内容</p>
                </div>
            </div>

            <!-- 组件系统 Tab -->
            <div class="tab-panel" id="components">
                <div class="container">
                    <h2>组件系统</h2>
                    <p>这是组件系统的内容</p>
                </div>
            </div>

            <!-- 第三方生态 Tab -->
            <div class="tab-panel" id="ecosystem">
                <div class="container">
                    <h2>第三方生态</h2>
                    <p>这是第三方生态的内容</p>
                </div>
            </div>

            <!-- 应用打包 Tab -->
            <div class="tab-panel" id="packaging">
                <div class="container">
                    <h2>应用打包</h2>
                    <p>这是应用打包的内容</p>
                </div>
            </div>

            <!-- 教程系列 Tab -->
            <div class="tab-panel" id="tutorials">
                <div class="container">
                    <h2>教程系列</h2>
                    <p>这是教程系列的内容</p>
                </div>
            </div>

            <!-- AI 代码生成 Tab -->
            <div class="tab-panel" id="ai-coding">
                <div class="container">
                    <h2>🤖 Flutter AI 代码生成</h2>
                    <p>利用 AI 工具大幅提升 Flutter 开发效率，从需求描述到完整代码的智能转换</p>
                    <div class="ai-benefits">
                        <h3>💡 AI 代码生成优势</h3>
                        <p>这是一个测试内容，用于验证tab切换功能。</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script src="diagnose_tab2.js"></script>
</body>
</html>
